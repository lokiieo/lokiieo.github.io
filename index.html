<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Command Prompt - lokiieo.github.io</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/icon.png">
  <style>
    @font-face {
      font-family: "RobotoMono";
      src: url("font.ttf") format("truetype");
    }

    body {
      background: radial-gradient(ellipse at center, #051a2e 0%, #05050a 70%);
      color: #00ff9c;
      font-family: RobotoMono, monospace;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.45) 2px,
        rgba(0, 0, 0, 0.45) 4px
      );
      background-size: 100% 4px;
      pointer-events: none;
      animation: scanMove 6s linear infinite;
      z-index: 999;
    }

    @keyframes scanMove {
      0%   { background-position: 0 0; }
      100% { background-position: 0 -40px; }
    }

    .terminal {
      max-width: 900px;
    }

    .line, .link-line {
      white-space: pre-wrap;
      min-height: 1.2em;
    }

    .link-line { color: #00cfff; }
    .link-line a { color: inherit; }

    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1em;
      background: #00ff9c;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="terminal" id="term"></div>

  <script>
    const term = document.getElementById('term');

    // each entry: { text, class, isLink, href, slowChars }
    // slowChars: set of characters that type slower
    const lines = [
      { text: 'booting lokiieo.github.io...' },
      { text: 'loading goobers... \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 done', slowChars: new Set(['\u2588']) },
      { text: '' }, // blank line
      { text: 'hello.' },
      { text: "dunno why you're here but hi ig" },
      { text: 'pong clone ig', cls: 'link-line', href: 'pong.exe' },
    ];

    const NORMAL_SPEED = 40;   // ms per char
    const SLOW_SPEED   = 90;   // ms per char for █

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function typeLine(lineObj) {
      const el = document.createElement('div');
      el.className = lineObj.cls || 'line';
      term.appendChild(el);

      if (!lineObj.text) {
        // blank spacer
        el.innerHTML = '<br>';
        return;
      }

      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);

      let typed = '';
      for (const ch of lineObj.text) {
        typed += ch;

        if (lineObj.href) {
          el.innerHTML = `<a href="${lineObj.href}" target="_blank" rel="noopener noreferrer">${typed}</a>`;
        } else {
          el.textContent = typed;
        }

        el.appendChild(cursor);

        const delay = lineObj.slowChars && lineObj.slowChars.has(ch) ? SLOW_SPEED : NORMAL_SPEED;
        await sleep(delay);
      }

      // remove cursor when line is done (re-added by next line)
      cursor.remove();
    }

    async function run() {
      for (const line of lines) {
        await typeLine(line);
        await sleep(120); // small pause between lines
      }
    }

    run();
  </script>
</body>
</html>
